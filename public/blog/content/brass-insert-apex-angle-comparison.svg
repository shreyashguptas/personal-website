<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1600" height="900" fill="#ffffff"/>

  <!-- ============ LEFT PANEL: WRONG ============ -->
  <g>
    <text x="400" y="80" font-size="34" font-weight="700" fill="#111" text-anchor="middle">What I drew (wrong)</text>
    <text x="400" y="118" font-size="20" fill="#666" text-anchor="middle">Sharp triangle, base = pitch × 0.75, depth = pitch × 0.5413</text>

    <!-- Triangle: pitch scale = 300px. base = 0.75*300 = 225, depth = 0.5413*300 ≈ 162 -->
    <!-- Apex at (400, 360), base from (287.5, 522) to (512.5, 522) -->
    <polygon points="287.5,522 512.5,522 400,360" fill="#fff5f5" stroke="#b32020" stroke-width="3" stroke-linejoin="round"/>

    <!-- Apex angle arc (~30px radius, spanning the ~69.43° angle symmetrically) -->
    <!-- Left side unit vector from apex: (-112.5, 162)/|...| ≈ (-0.570, 0.821). At r=34: (-19.4, 27.9) -->
    <!-- Right side unit vector from apex: (112.5, 162)/|...| ≈ (0.570, 0.821). At r=34: (19.4, 27.9) -->
    <path d="M 380.6 387.9 A 34 34 0 0 0 419.4 387.9" fill="none" stroke="#b32020" stroke-width="2.5"/>
    <text x="400" y="345" font-size="32" font-weight="700" fill="#b32020" text-anchor="middle">69.4266°</text>

    <!-- Base dimension line (below) -->
    <line x1="287.5" y1="560" x2="512.5" y2="560" stroke="#666" stroke-width="1.5"/>
    <line x1="287.5" y1="550" x2="287.5" y2="570" stroke="#666" stroke-width="1.5"/>
    <line x1="512.5" y1="550" x2="512.5" y2="570" stroke="#666" stroke-width="1.5"/>
    <text x="400" y="598" font-size="20" fill="#333" text-anchor="middle">base = pitch × 0.75</text>

    <!-- Depth dimension line (right of triangle) -->
    <line x1="580" y1="360" x2="580" y2="522" stroke="#666" stroke-width="1.5"/>
    <line x1="570" y1="360" x2="590" y2="360" stroke="#666" stroke-width="1.5"/>
    <line x1="570" y1="522" x2="590" y2="522" stroke="#666" stroke-width="1.5"/>
    <text x="600" y="438" font-size="20" fill="#333">depth = pitch × 0.5413</text>
    <text x="600" y="464" font-size="16" fill="#888" font-style="italic">("working thread depth")</text>

    <!-- Bottom caption -->
    <text x="400" y="720" font-size="19" fill="#444" text-anchor="middle">0.5413 is the height for a <tspan font-style="italic">truncated</tspan> (trapezoidal) apex.</text>
    <text x="400" y="748" font-size="19" fill="#444" text-anchor="middle">Used on a sharp triangle, the apex angle widens.</text>
  </g>

  <!-- Divider -->
  <line x1="800" y1="100" x2="800" y2="800" stroke="#e0e0e0" stroke-width="1"/>

  <!-- ============ RIGHT PANEL: CORRECT ============ -->
  <g>
    <text x="1200" y="80" font-size="34" font-weight="700" fill="#111" text-anchor="middle">What a sharp 60° triangle needs</text>
    <text x="1200" y="118" font-size="20" fill="#666" text-anchor="middle">Sharp triangle, base = pitch, depth = pitch × 0.866</text>

    <!-- Triangle: pitch scale = 300px. base = 300, depth = 0.866*300 ≈ 260 -->
    <!-- Apex at (1200, 262), base from (1050, 522) to (1350, 522) -->
    <polygon points="1050,522 1350,522 1200,262" fill="#f2fbf5" stroke="#1a7a3a" stroke-width="3" stroke-linejoin="round"/>

    <!-- Apex angle arc (30° on each side of vertical axis) -->
    <!-- Left side unit vector from apex: (-150, 260)/300 = (-0.5, 0.866). At r=34: (-17, 29.4) -->
    <!-- Right side unit vector from apex: (150, 260)/300 = (0.5, 0.866). At r=34: (17, 29.4) -->
    <path d="M 1183 291.4 A 34 34 0 0 0 1217 291.4" fill="none" stroke="#1a7a3a" stroke-width="2.5"/>
    <text x="1200" y="248" font-size="32" font-weight="700" fill="#1a7a3a" text-anchor="middle">60°</text>

    <!-- Base dimension line (below) -->
    <line x1="1050" y1="560" x2="1350" y2="560" stroke="#666" stroke-width="1.5"/>
    <line x1="1050" y1="550" x2="1050" y2="570" stroke="#666" stroke-width="1.5"/>
    <line x1="1350" y1="550" x2="1350" y2="570" stroke="#666" stroke-width="1.5"/>
    <text x="1200" y="598" font-size="20" fill="#333" text-anchor="middle">base = pitch</text>

    <!-- Depth dimension line (right of triangle) -->
    <line x1="1420" y1="262" x2="1420" y2="522" stroke="#666" stroke-width="1.5"/>
    <line x1="1410" y1="262" x2="1430" y2="262" stroke="#666" stroke-width="1.5"/>
    <line x1="1410" y1="522" x2="1430" y2="522" stroke="#666" stroke-width="1.5"/>
    <text x="1440" y="388" font-size="20" fill="#333">depth = pitch × 0.866</text>
    <text x="1440" y="414" font-size="16" fill="#888" font-style="italic">( = √3 / 2 )</text>

    <!-- Bottom caption -->
    <text x="1200" y="720" font-size="19" fill="#444" text-anchor="middle">A sharp apex requires depth = √3/2 of the base.</text>
    <text x="1200" y="748" font-size="19" fill="#444" text-anchor="middle">Base and depth must describe the same triangle.</text>
  </g>
</svg>
