<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1600" height="900" fill="#ffffff"/>

  <!-- ============ LEFT PANEL: INVALID CONTACT ============ -->
  <g>
    <text x="400" y="70" font-size="32" font-weight="700" fill="#111" text-anchor="middle">baseWidth = pitch</text>
    <text x="400" y="104" font-size="19" fill="#b32020" text-anchor="middle">Shapr3D: "invalid contact / swept body" error</text>

    <!-- Bore wall (vertical line along the thread axis) -->
    <line x1="330" y1="140" x2="330" y2="560" stroke="#888" stroke-width="2"/>
    <text x="330" y="125" font-size="14" fill="#888" text-anchor="middle">bore wall</text>

    <!-- Axial direction arrow on far left -->
    <line x1="180" y1="250" x2="180" y2="450" stroke="#aaa" stroke-width="1.5"/>
    <polygon points="180,140 175,155 185,155" fill="#aaa"/>
    <line x1="180" y1="140" x2="180" y2="250" stroke="#aaa" stroke-width="1.5"/>
    <polygon points="180,560 175,545 185,545" fill="#aaa"/>
    <line x1="180" y1="450" x2="180" y2="560" stroke="#aaa" stroke-width="1.5"/>
    <text x="180" y="355" font-size="14" fill="#888" text-anchor="middle" transform="rotate(-90 180 355)">axial direction</text>

    <!-- Pitch dimension (1 pitch = 200px) -->
    <line x1="240" y1="150" x2="240" y2="350" stroke="#333" stroke-width="1.5"/>
    <line x1="230" y1="150" x2="250" y2="150" stroke="#333" stroke-width="1.5"/>
    <line x1="230" y1="350" x2="250" y2="350" stroke="#333" stroke-width="1.5"/>
    <text x="220" y="255" font-size="17" fill="#333" text-anchor="end">1 pitch</text>
    <text x="220" y="275" font-size="17" fill="#333" text-anchor="end">period</text>

    <!-- Triangle 1 (upper): base (330,150)-(330,350), apex (503,250). Depth = 0.866×pitch ≈ 173 -->
    <polygon points="330,150 330,350 503,250" fill="#fff5f5" stroke="#b32020" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Triangle 2 (lower): base (330,350)-(330,550), apex (503,450) -->
    <polygon points="330,350 330,550 503,450" fill="#fff5f5" stroke="#b32020" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Red highlight circle at the touching corner -->
    <circle cx="330" cy="350" r="22" fill="none" stroke="#d33" stroke-width="3.5"/>

    <!-- Leader arrow from circle to label -->
    <line x1="355" y1="355" x2="530" y2="370" stroke="#d33" stroke-width="1.5"/>
    <polygon points="530,370 520,364 522,376" fill="#d33"/>
    <text x="540" y="365" font-size="17" font-weight="600" fill="#b32020">adjacent triangle corners</text>
    <text x="540" y="388" font-size="17" font-weight="600" fill="#b32020">touch at the pitch boundary</text>

    <!-- Base width label on triangle 1 -->
    <text x="438" y="185" font-size="15" fill="#444" text-anchor="end">base = pitch</text>

    <!-- Depth label on triangle 1 -->
    <line x1="330" y1="260" x2="503" y2="260" stroke="#666" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="420" y="278" font-size="15" fill="#666" text-anchor="middle">depth = pitch × 0.866</text>

    <!-- Bottom caption -->
    <text x="400" y="650" font-size="19" fill="#333" text-anchor="middle" font-weight="600">Each profile spans one full pitch period along the axis.</text>
    <text x="400" y="678" font-size="19" fill="#444" text-anchor="middle">Adjacent triangles share their end vertices — zero-width contact.</text>
    <text x="400" y="706" font-size="19" fill="#444" text-anchor="middle">The revolve sweeper rejects this as an invalid body.</text>
  </g>

  <!-- Divider -->
  <line x1="800" y1="80" x2="800" y2="820" stroke="#e0e0e0" stroke-width="1"/>

  <!-- ============ RIGHT PANEL: VALID WITH CREST FLATS ============ -->
  <g>
    <text x="1200" y="70" font-size="32" font-weight="700" fill="#111" text-anchor="middle">baseWidth = pitch × 0.75</text>
    <text x="1200" y="104" font-size="19" fill="#1a7a3a" text-anchor="middle">Crest flats between profiles → revolve succeeds</text>

    <!-- Bore wall -->
    <line x1="1030" y1="140" x2="1030" y2="560" stroke="#888" stroke-width="2"/>
    <text x="1030" y="125" font-size="14" fill="#888" text-anchor="middle">bore wall</text>

    <!-- Pitch dimension (1 pitch = 200px, aligned with left panel for direct visual comparison) -->
    <line x1="940" y1="150" x2="940" y2="350" stroke="#333" stroke-width="1.5"/>
    <line x1="930" y1="150" x2="950" y2="150" stroke="#333" stroke-width="1.5"/>
    <line x1="930" y1="350" x2="950" y2="350" stroke="#333" stroke-width="1.5"/>
    <text x="920" y="255" font-size="17" fill="#333" text-anchor="end">1 pitch</text>
    <text x="920" y="275" font-size="17" fill="#333" text-anchor="end">period</text>

    <!-- Triangle 1: base (1030,175)-(1030,325) [150px = 0.75×pitch], apex (1160,250). Depth = 0.866×150 = 130 -->
    <polygon points="1030,175 1030,325 1160,250" fill="#f2fbf5" stroke="#1a7a3a" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Triangle 2: base (1030,375)-(1030,525), apex (1160,450). Same shape, shifted down one pitch. -->
    <polygon points="1030,375 1030,525 1160,450" fill="#f2fbf5" stroke="#1a7a3a" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Crest flat highlight: the gap from y=325 to y=375 on the bore wall -->
    <line x1="1030" y1="325" x2="1030" y2="375" stroke="#1a7a3a" stroke-width="6"/>

    <!-- Crest flat dimension on the right of bore wall -->
    <line x1="1010" y1="325" x2="1010" y2="375" stroke="#1a7a3a" stroke-width="1.5"/>
    <line x1="1000" y1="325" x2="1020" y2="325" stroke="#1a7a3a" stroke-width="1.5"/>
    <line x1="1000" y1="375" x2="1020" y2="375" stroke="#1a7a3a" stroke-width="1.5"/>
    <line x1="1005" y1="350" x2="850" y2="640" stroke="#1a7a3a" stroke-width="1.5"/>
    <polygon points="850,640 860,634 858,646" fill="#1a7a3a"/>
    <text x="1200" y="660" font-size="18" font-weight="600" fill="#1a7a3a" text-anchor="middle">crest flat = pitch × 0.25</text>
    <text x="1200" y="685" font-size="16" fill="#1a7a3a" text-anchor="middle">(uncut bore wall between adjacent threads)</text>

    <!-- Base width label on triangle 1 -->
    <text x="1095" y="205" font-size="15" fill="#444" text-anchor="end">base = pitch × 0.75</text>

    <!-- Depth label on triangle 1 -->
    <line x1="1030" y1="257" x2="1160" y2="257" stroke="#666" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="1095" y="275" font-size="15" fill="#666" text-anchor="middle">depth = baseWidth × 0.866</text>

    <!-- Bottom caption -->
    <text x="1200" y="720" font-size="19" fill="#333" text-anchor="middle" font-weight="600">Shrinking base to 75% of pitch leaves a 25% uncut gap.</text>
    <text x="1200" y="748" font-size="19" fill="#444" text-anchor="middle">Depth follows base (both scale by 0.75) so apex stays at 60°.</text>
    <text x="1200" y="776" font-size="19" fill="#444" text-anchor="middle">This is what real ISO threads look like anyway.</text>
  </g>
</svg>
